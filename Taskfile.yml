version: "3"

tasks:
  format:
    cmds:
      - npx --yes prettier --write AGENTS.md PURIA.md .puria/**/*.md Taskfile.yml
      - taplo format mise.toml

  lint:
    cmds:
      - task lint:design

  lint:design:
    cmds:
      - if [ -f .puria/design/DESIGN.md ]; then npx --yes @google/design.md lint .puria/design/DESIGN.md; fi
